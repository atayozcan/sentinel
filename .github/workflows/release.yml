name: release

on:
  push:
    tags:
      - 'v*'

# Don't cancel an in-flight release if a second tag is pushed before the
# first finishes — partial releases (half-uploaded assets, a draft GH
# release missing artefacts) are worse than queuing.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  RUSTFLAGS: -C link-arg=-fuse-ld=mold

jobs:
  # ===========================================================================
  # KDE/Plasma frontend bundle. openSUSE Tumbleweed container (Qt6 + KF6),
  # x86_64 + aarch64. Tarball-only (ships via AUR + source bundle).
  # ===========================================================================
  build-kde:
    name: build kde (${{ matrix.arch }})
    runs-on: ${{ matrix.runs-on }}
    container: registry.opensuse.org/opensuse/tumbleweed:latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs-on: ubuntu-latest
          - arch: aarch64
            runs-on: ubuntu-24.04-arm
    steps:
      - name: Install toolchain + Qt/KF6 deps
        # Tumbleweed is rolling: a referenced RPM can rotate off the mirror
        # between metadata build and download (a 404). Refresh first and
        # retry the whole install a few times to ride out mirror lag.
        run: |
          ok=0
          for attempt in 1 2 3 4 5; do
            if zypper -n refresh && zypper -n install --no-recommends \
                 git tar gzip gcc gcc-c++ make mold \
                 rust cargo pam-devel \
                 qt6-base-devel qt6-base-private-devel \
                 qt6-declarative-devel qt6-declarative-private-devel \
                 kf6-kirigami-imports kf6-qqc2-desktop-style \
                 layer-shell-qt6-imports kf6-breeze-icons qt6-wayland; then
              ok=1; break
            fi
            echo "zypper attempt $attempt failed (Tumbleweed mirror lag); retrying in 30s…" >&2
            sleep 30
          done
          # Fail the step loudly if deps never installed, rather than
          # falling through to a confusing cargo "missing Qt" error.
          [ "$ok" = 1 ] || { echo "::error::zypper dependency install failed after 5 attempts"; exit 1; }

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build tarballs (kde)
        run: ./packaging-kde/scripts/build-release.sh "${{ steps.ver.outputs.version }}"

      - name: Attest release artefacts
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*.tar.gz

      - name: Upload artefacts
        uses: actions/upload-artifact@v7
        with:
          name: kde-${{ steps.ver.outputs.version }}-${{ matrix.arch }}
          path: dist/

  # ===========================================================================
  # Single GitHub release carrying the KDE bundle.
  # ===========================================================================
  release:
    needs: [build-kde]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Verify release-notes file exists
        run: |
          v="${GITHUB_REF_NAME#v}"
          if [ ! -f ".github/release-notes/v$v.md" ]; then
            echo "::error::missing .github/release-notes/v$v.md — create it before tagging" >&2
            exit 1
          fi

      - name: Download artefacts
        uses: actions/download-artifact@v8
        with:
          path: artefacts

      - name: Flatten
        run: |
          mkdir -p dist
          # KDE bundle is tarball-only (sentinel-kde-<ver>-<arch>-linux.tar.gz
          # + .sha256); per-arch names are unique, so a plain mv has no
          # collisions.
          find artefacts -type f \
            \( -name '*.tar.gz' -o -name '*.sha256' \) \
            -exec mv -t dist/ {} +
          ls -la dist

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          v="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --title "Sentinel v$v" \
            --notes-file ".github/release-notes/v$v.md" \
            dist/*

  # ===========================================================================
  # AUR publish — the `sentinel-kde` package, sourced from this monorepo's
  # tag tarball. Gated on `release` so AUR only moves when the build + release
  # succeeded. Requires secret AUR_SSH_PRIVATE_KEY (AUR-only ed25519 key).
  # ===========================================================================
  publish-aur-kde:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Stage PKGBUILD + install hook
        run: |
          mkdir -p aur-stage
          cp packaging-kde/packaging/arch/PKGBUILD aur-stage/PKGBUILD
          cp packaging-kde/packaging/arch/sentinel-kde.install aur-stage/
      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: sentinel-kde
          pkgbuild: aur-stage/PKGBUILD
          assets: aur-stage/sentinel-kde.install
          commit_username: sipsip
          commit_email: atayozcan@pm.me
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Release ${{ github.ref_name }}"
          updpkgsums: true
          ssh_keyscan_types: rsa,ed25519
