name: ci

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

# Cancel in-flight runs of this workflow when a new commit is pushed
# to the same ref. Keeps PR feedback fast and CI minutes cheap.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  # Keep the install-path env vars in sync with build.rs defaults so
  # the workspace builds without needing the install.sh wrapper.
  SENTINEL_PREFIX: /usr
  SENTINEL_SYSCONFDIR: /etc
  SENTINEL_LIBEXECDIR: lib
  # Use mold for faster linking. Doesn't change the produced binary
  # (only build-id differs); shaves wall-time off the link step,
  # which fat LTO + codegen-units=1 makes the dominant non-LTO cost.
  # Each job's apt-get installs mold before cargo runs.
  RUSTFLAGS: -C link-arg=-fuse-ld=mold

# Least-privilege default for every job in this workflow. Individual
# jobs that need more (e.g. uploading SARIF, writing artefacts beyond
# the runner's scratch) override this with their own `permissions:`
# block. Scorecard's `actions/missing-workflow-permissions` rule
# expects this at the workflow level.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Format + clippy. Cheap, fail-fast — runs without --release so it picks
  # up test code too.
  # ---------------------------------------------------------------------------
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpam0g-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            pkg-config \
            mold

      - name: Install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ---------------------------------------------------------------------------
  # Tests. Runs against stable Rust on Linux. The PAM module is a cdylib
  # so we run `cargo test -p pam-sentinel` separately to exercise its
  # internal unit tests; the rest go through the workspace runner.
  # ---------------------------------------------------------------------------
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpam0g-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            pkg-config \
            mold

      - name: Install rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo test (workspace)
        run: cargo test --workspace --locked

  # ---------------------------------------------------------------------------
  # Smoke build of the full workspace on both x86_64 and aarch64. The
  # PKGBUILDs claim aarch64 support; this proves it. Free arm64 runners
  # for public repos use ubuntu-24.04-arm.
  # ---------------------------------------------------------------------------
  build:
    name: cargo build (release, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpam0g-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            pkg-config \
            mold

      - name: Install rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo build --release
        run: cargo build --release --workspace --locked

  # ---------------------------------------------------------------------------
  # Security audit of the dependency tree against the RustSec advisory
  # database. Sentinel sits in the PAM auth path — a known CVE in any
  # transitive dep is something we want failing CI loudly, not waiting
  # for someone to notice.
  # ---------------------------------------------------------------------------
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install mold
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends mold

      - name: Install rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      - name: cargo audit
        # Ignored advisories (each must have a why-comment):
        #
        # RUSTSEC-2024-0436 — `paste 1.0.15` is unmaintained.
        #   Pulled in transitively via libcosmic → iced_wgpu → wgpu →
        #   wgpu-hal → metal (the Apple Metal backend). Sentinel is
        #   Linux-only and never executes the metal code path; wgpu
        #   ships all backends in Cargo.lock regardless of target.
        #   Drop this when libcosmic ships a wgpu version whose
        #   transitive deps no longer include `paste`.
        run: cargo audit --deny warnings --ignore RUSTSEC-2024-0436

  # ---------------------------------------------------------------------------
  # `cargo deny` — license / source / banned-crate enforcement.
  # Stricter cousin of `cargo audit`: catches a GPL-incompatible license
  # sneaking in through a transitive dep, or a crate hosted somewhere
  # we don't trust. Config lives in `deny.toml` at repo root.
  # ---------------------------------------------------------------------------
  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install mold
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends mold

      - name: Install rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      - name: cargo deny check
        run: cargo deny check

  # ---------------------------------------------------------------------------
  # Agent integration test — drives `session::run` end-to-end through
  # the Allow / Deny / Timeout paths plus cancel-drain, with the helper
  # and polkit-agent-helper-1 short-circuited via env-var test seams.
  # Catches state-machine regressions without needing D-Bus / polkit /
  # a Wayland session in CI.
  # ---------------------------------------------------------------------------
  agent-integration:
    name: agent integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpam0g-dev pkg-config

      - name: Install rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo test (agent_flow)
        run: cargo test -p sentinel-polkit-agent --test agent_flow --locked

  # ---------------------------------------------------------------------------
  # REUSE / SPDX compliance. Verifies every file is mapped (either via
  # an inline `SPDX-License-Identifier` header or a `REUSE.toml` glob)
  # to a known license. Together with the per-file headers added in
  # v0.7.0, this catches license drift as contributors add files
  # without the SPDX boilerplate.
  # ---------------------------------------------------------------------------
  reuse:
    name: REUSE lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: REUSE compliance check
        uses: fsfe/reuse-action@v6

  # ---------------------------------------------------------------------------
  # Package smoke. Catches `cargo deb` / `cargo generate-rpm` metadata
  # typos at PR time rather than on tag-push (where they block a
  # release). Reuses the workspace build via cache, so this is fast.
  # ---------------------------------------------------------------------------
  package:
    name: cargo deb + generate-rpm (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpam0g-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            pkg-config \
            mold

      - name: Install rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deb and cargo-generate-rpm
        run: |
          cargo install --locked cargo-deb
          cargo install --locked cargo-generate-rpm

      - name: Build release artefacts
        run: cargo build --release --workspace --locked

      - name: Generate completions + man pages
        # cargo-deb / generate-rpm reference these as assets.
        run: |
          mkdir -p target/release/share
          for bin in sentinel-helper sentinel-polkit-agent; do
            target/release/$bin completions bash > target/release/share/$bin.bash
            target/release/$bin completions fish > target/release/share/$bin.fish
            target/release/$bin completions zsh  > target/release/share/_$bin
            target/release/$bin man              > target/release/share/$bin.1
          done

      - name: cargo deb (no rebuild)
        run: cargo deb --no-build -p sentinel-helper

      - name: cargo generate-rpm
        run: cargo generate-rpm -p crates/sentinel-helper
