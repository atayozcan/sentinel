name: ci

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

# Cancel in-flight runs of this workflow when a new commit is pushed
# to the same ref. Keeps PR feedback fast and CI minutes cheap.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  # Keep the install-path env vars in sync with build.rs defaults so
  # the workspace builds without needing the install.sh wrapper.
  SENTINEL_PREFIX: /usr
  SENTINEL_SYSCONFDIR: /etc
  SENTINEL_LIBEXECDIR: lib

jobs:
  # ---------------------------------------------------------------------------
  # Format + clippy. Cheap, fail-fast — runs without --release so it picks
  # up test code too.
  # ---------------------------------------------------------------------------
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpam0g-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            pkg-config

      - name: Install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ---------------------------------------------------------------------------
  # Tests. Runs against stable Rust on Linux. The PAM module is a cdylib
  # so we run `cargo test -p pam-sentinel` separately to exercise its
  # internal unit tests; the rest go through the workspace runner.
  # ---------------------------------------------------------------------------
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpam0g-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            pkg-config

      - name: Install rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo test (workspace)
        run: cargo test --workspace --locked

  # ---------------------------------------------------------------------------
  # Smoke build of the full workspace on both x86_64 and aarch64. The
  # PKGBUILDs claim aarch64 support; this proves it. Free arm64 runners
  # for public repos use ubuntu-24.04-arm.
  # ---------------------------------------------------------------------------
  build:
    name: cargo build (release, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpam0g-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            pkg-config

      - name: Install rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo build --release
        run: cargo build --release --workspace --locked

  # ---------------------------------------------------------------------------
  # Security audit of the dependency tree against the RustSec advisory
  # database. Sentinel sits in the PAM auth path — a known CVE in any
  # transitive dep is something we want failing CI loudly, not waiting
  # for someone to notice.
  # ---------------------------------------------------------------------------
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      - name: cargo audit
        # Ignored advisories (each must have a why-comment):
        #
        # RUSTSEC-2024-0436 — `paste 1.0.15` is unmaintained.
        #   Pulled in transitively via libcosmic → iced_wgpu → wgpu →
        #   wgpu-hal → metal (the Apple Metal backend). Sentinel is
        #   Linux-only and never executes the metal code path; wgpu
        #   ships all backends in Cargo.lock regardless of target.
        #   Drop this when libcosmic ships a wgpu version whose
        #   transitive deps no longer include `paste`.
        run: cargo audit --deny warnings --ignore RUSTSEC-2024-0436
