name: codeql

# GitHub's static analysis. Free for public repos. Rust support is
# relatively new (GA late 2025) — if a build step here breaks,
# disable the workflow rather than blocking PRs while we sort it
# out. Results land in the repo's Security tab → Code scanning.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 05:00 UTC scan against the latest main, even if
    # nobody pushed — picks up new CodeQL queries shipped upstream.
    - cron: '0 5 * * 1'

# Don't pile up scans on a busy branch.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [rust, actions]
    steps:
      - uses: actions/checkout@v6

      # Build deps for the Rust analysis (CodeQL invokes the actual
      # cargo build via its autobuild step).
      - name: Install build deps
        if: matrix.language == 'rust'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpam0g-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            pkg-config

      - name: Install rust
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@stable

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        if: matrix.language == 'rust'
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
