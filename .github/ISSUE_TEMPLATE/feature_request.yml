name: Feature request
description: Suggest a new feature, behavior change, or polish idea.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Sentinel is a small tool with a
        narrow scope (graphical confirmation for privilege escalation
        on Wayland-first desktops); features that pull it toward
        being a sandbox, MDM tool, or general logging framework are
        usually out of scope. Otherwise: please describe the use case
        and we'll discuss.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation, not the proposed implementation.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: |
        How should Sentinel behave to address the problem? If you have a
        specific UI / config / CLI shape in mind, describe it here.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools, workarounds, or approaches you've thought about.

  - type: dropdown
    id: scope
    attributes:
      label: Which component?
      multiple: true
      options:
        - pam_sentinel.so (PAM module)
        - sentinel-helper (dialog UI)
        - sentinel-polkit-agent
        - sentinel-config / TOML schema
        - install.sh / packaging
        - i18n / translations
        - Other
    validations:
      required: true
