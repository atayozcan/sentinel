[workspace]
resolver = "2"
members = [
    "crates/pam-sentinel",
    "crates/sentinel-config",
    "crates/sentinel-helper",
    "crates/sentinel-polkit-agent",
]

[workspace.package]
version = "0.5.1"
edition = "2024"
license = "GPL-3.0-or-later"
repository = "https://github.com/atayozcan/sentinel"
authors = ["Atay Özcan <atay@oezcan.me>"]
rust-version = "1.85"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
toml = "1.1.2"
log = "0.4"
syslog = "7"
nix = { version = "0.31.2", features = ["fs", "process", "user", "poll", "signal"] }
anyhow = "1"
thiserror = "2"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
panic = "abort"
