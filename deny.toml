# cargo-deny configuration.
#
# Run locally with `cargo deny check` (install: `cargo install --locked
# cargo-deny`). CI runs the same command on every PR — see
# `.github/workflows/ci.yml`.
#
# Sentinel's own license is GPL-3.0-or-later; this config allows
# transitive dependencies under any standard FOSS license that's
# compatible with that, plus the libcosmic git source we pin in
# `crates/sentinel-helper/Cargo.toml`.

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ----------------------------------------------------------------------
# Advisories — overlap with `cargo audit` is intentional. cargo-deny
# checks the same RustSec database; keeping the ignore list mirrored
# here means a single source of truth for "we know about this and
# accept the risk".
# ----------------------------------------------------------------------
[advisories]
yanked = "deny"
ignore = [
    # `paste 1.0.15` is unmaintained. Pulled in transitively via
    # libcosmic → iced_wgpu → wgpu → wgpu-hal → metal (Apple Metal
    # backend). Sentinel is Linux-only and never executes the metal
    # code path. Drop when libcosmic's wgpu chain no longer pulls
    # `paste`.
    "RUSTSEC-2024-0436",
]

# ----------------------------------------------------------------------
# Licenses — standard FOSS allowlist. Anything outside this list will
# fail CI; either add it here (with a justification comment) or replace
# the dependency.
# ----------------------------------------------------------------------
[licenses]
allow = [
    "GPL-3.0-or-later",
    # cosmic-protocols and its client-toolkit sub-crate ship as
    # GPL-3.0-only. Compatible with our GPL-3.0-or-later linking.
    "GPL-3.0-only",
    "GPL-3.0",
    "LGPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unlicense",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "OFL-1.1",
    "BSL-1.0",
    "0BSD",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

# Crates whose Cargo.toml omits the `license` field — most often a
# pop-os/libcosmic workspace member that inherits from the parent
# workspace's MPL-2.0 license but doesn't declare it per-crate.
# cargo-deny can't follow that inheritance, so we clarify each one
# explicitly. The license expressions match the upstream repos'
# top-level LICENSE files.
[[licenses.clarify]]
crate = "cosmic-config"
expression = "MPL-2.0"
license-files = []
[[licenses.clarify]]
crate = "cosmic-config-derive"
expression = "MPL-2.0"
license-files = []
[[licenses.clarify]]
crate = "cosmic-theme"
expression = "MPL-2.0"
license-files = []
[[licenses.clarify]]
crate = "cosmic-settings-daemon"
expression = "MPL-2.0"
license-files = []
# `dnd` and `mime` ship from pop-os/window_clipboard (workspace
# license: MPL-2.0); per-crate manifests don't declare. Same shape
# as cosmic-config et al.
[[licenses.clarify]]
crate = "dnd"
expression = "MPL-2.0"
license-files = []
[[licenses.clarify]]
crate = "mime"
expression = "MPL-2.0"
license-files = []
# `apply` (crates.io) is a tiny utility crate that ships without a
# license field. Per its README and crates.io page it's MIT.
[[licenses.clarify]]
crate = "apply"
expression = "MIT"
license-files = []

# ----------------------------------------------------------------------
# Bans — currently no banned crates. Use this section to block a
# specific dep (e.g. `openssl-sys` if we wanted to enforce rustls only).
# ----------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "warn"

# ----------------------------------------------------------------------
# Sources — crates.io is the only registry; for git, libcosmic pulls a
# moving set of pop-os repos (winit, cosmic-protocols, window_clipboard,
# softbuffer, freedesktop-icons, smithay-clipboard, …) plus a couple of
# iced-rs repos. Listing each one is brittle — every libcosmic bump
# tends to add or move a source and we'd false-fail CI for a week.
#
# Use `warn` so unaccounted git sources surface in the CI log (we still
# see what's being pulled) without gating the merge. The `allow-git`
# entries below are informational; they document the sources we've
# specifically reviewed.
# ----------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-git = [
    "https://github.com/pop-os/libcosmic",
    "https://github.com/pop-os/libcosmic.git",
    "https://github.com/pop-os/winit",
    "https://github.com/pop-os/winit.git",
    "https://github.com/pop-os/cosmic-protocols",
    "https://github.com/pop-os/cosmic-protocols.git",
    "https://github.com/pop-os/dbus-settings-bindings",
    "https://github.com/pop-os/dbus-settings-bindings.git",
    "https://github.com/pop-os/window_clipboard",
    "https://github.com/pop-os/window_clipboard.git",
    "https://github.com/pop-os/smithay-clipboard",
    "https://github.com/pop-os/softbuffer",
    "https://github.com/pop-os/freedesktop-icons",
    "https://github.com/iced-rs/cryoglyph.git",
    "https://github.com/jackpot51/rust-atomicwrites",
]
