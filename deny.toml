# cargo-deny configuration.
#
# Run locally: `cargo deny check` (install: `cargo install --locked cargo-deny`).
#
# Sentinel-KDE's own license is GPL-3.0-or-later. Its dependency tree is
# entirely crates.io (cxx-qt for the GUI, zbus for D-Bus, tokio/clap/serde/nix
# for the rest) — no git sources.

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ---------------------------------------------------------------------------
# Advisories — RustSec database. Empty ignore list: address findings by
# upgrading or, if unavoidable, add the ID here with a justification.
# ---------------------------------------------------------------------------
[advisories]
yanked = "deny"
ignore = []

# ---------------------------------------------------------------------------
# Licenses — standard permissive/FOSS allowlist compatible with our
# GPL-3.0-or-later. Anything outside this fails the check; add it here with a
# justification or replace the dependency.
# ---------------------------------------------------------------------------
[licenses]
allow = [
    "GPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "0BSD",
    "CC0-1.0",
    "Unlicense",
]
confidence-threshold = 0.8

# ---------------------------------------------------------------------------
# Bans — none currently. Use this to block a specific crate or to tighten
# duplicate-version / wildcard policy once the tree settles.
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "warn"

# ---------------------------------------------------------------------------
# Sources — crates.io only.
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
