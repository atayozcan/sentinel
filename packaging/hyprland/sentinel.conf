# Optional Hyprland config snippet for Sentinel.
#
# Hyprland exposes per-namespace `layerrule` controls; the helper
# binds its layer-shell surface under namespace `"sentinel"` (see
# `crates/sentinel-helper/src/app.rs`). The rules below give the
# dialog a fade-in animation and a slight blur on top of the
# translucent backdrop, matching what a UAC-style prompt feels
# like on Windows / macOS.
#
# Drop into your Hyprland config (e.g. via
# `source = ~/.config/hypr/sentinel.conf`) or copy the rules
# inline. None of this is required — Sentinel works without it,
# this is purely cosmetic.

# Fade in (≈150ms) instead of popping into existence.
layerrule = animation fade, sentinel

# Blur the underlying screen for nicer focus separation.
layerrule = blur, sentinel
layerrule = ignorezero, sentinel  # don't blur our own translucent backdrop's alpha-zero pixels

# Belt and braces: ensure the dialog gets keyboard focus immediately.
# Hyprland honors layer-shell exclusive keyboard interactivity by
# default, but if you have global focus-stealing-prevention enabled,
# this restores the expected behavior.
layerrule = unset, sentinel
