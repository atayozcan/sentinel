# sentinel configuration file
# /etc/security/sentinel.conf
#
# Format: TOML (https://toml.io)

[general]
# Enable the confirmation dialog
enabled = true

# Timeout in seconds before auto-deny (0 = no timeout)
timeout = 30

# Randomize button positions to deter automated clicking
randomize_buttons = true

# Action when no Wayland display is available.
# Options:
#   "allow"    — silently allow (DANGEROUS, not recommended)
#   "deny"     — silently deny
#   "password" — fall through to password auth (recommended)
headless_action = "password"

# Show detailed information about the requesting process
show_process_info = true

# Log all confirmation attempts to syslog
log_attempts = true

# Minimum time (milliseconds) the dialog must be visible before "Allow" is
# enabled. Prevents instant automated clicks.
min_display_time_ms = 500

[appearance]
# Dialog title
title = "Authentication Required"

# Primary message — substitutions: %u=user, %s=service, %p=process
message = 'The application "%p" is requesting elevated privileges.'

# Secondary hint line, rendered below the message. Empty by default
# (the previous "Click Allow… or Deny…" wording broke under
# randomize_buttons by naming the left button). Set to a non-empty
# string to show a hint; %u/%s/%p substitution applies.
secondary = ""

[audio]
# UAC-style audio cue when the dialog appears. Resolved via the
# freedesktop sound naming spec, played through `canberra-gtk-play`
# (silent if not installed). Set to "" to disable.
# Common values: "dialog-warning", "bell", "message", "dialog-question".
sound_name = "dialog-warning"

# Per-service overrides. Each entry can set `enabled`, `timeout`,
# `randomize`, `remember_seconds`. Unknown keys are a parse error.
#
# Terminal sudo/su below opt INTO the remember window (300s). A repeat of
# the SAME command then auto-allows without a prompt for that window —
# grants are keyed by the FULL command (so `sudo pacman -Syu` does NOT
# cover `sudo pacman -U file`) and shells/interpreters are excluded.
# Requires the sentinel-broker service. Set remember_seconds = 0 to make a
# service confirm every time. (Compiled default for terminal is still 0;
# this file opts the terminal services in.)
[services.sudo]
enabled = true
timeout = 30
randomize = true
remember_seconds = 300

[services.sudo-i]
enabled = true
timeout = 30
randomize = true
remember_seconds = 300

[services.su]
enabled = true
timeout = 30
randomize = true
remember_seconds = 300

[services."polkit-1"]
enabled = true
timeout = 30
randomize = true

[services.login]
enabled = false

[services.gdm-password]
enabled = false

[services.lightdm]
enabled = false

[services.sddm]
enabled = false
# ---------------------------------------------------------------------------
# Static allow/deny policy, evaluated BEFORE the dialog. Disabled by
# default (empty lists never match). Entries match the requesting
# program's resolved executable path (/proc/<pid>/exe — never the
# spoofable argv[0]), its basename when the entry has no '/', or the
# polkit action id. `deny` takes precedence over `allow`.
#
# ⚠️  An `allow` entry is passwordless elevation for that target — it is
# as load-bearing as a sudoers NOPASSWD line. Prefer absolute paths,
# keep the list short.
# [policy]
# allow = [
#     "/usr/bin/topgrade",                 # full path (recommended)
#     "pacman",                            # basename — matches any path named 'pacman'
# ]
# deny = [
#     "org.freedesktop.systemd1.manage-units",   # polkit action id
# ]

# ---------------------------------------------------------------------------
# Desktop notifications (via notify-send / libnotify) on the polkit/GUI
# auth path. Terminal sudo/su denials are already visible in the
# terminal, so they're not covered. Both default off.
# [notifications]
# on_deny = false      # notify when a request is denied (incl. policy denials)
# on_timeout = false   # notify when a request auto-denies on timeout

# ---------------------------------------------------------------------------
# "Remember" window (sudo-timestamp style). After you Allow with the
# dialog's "Remember" checkbox ticked, repeat requests from the same
# login session for the same action + binary auto-allow WITHOUT a dialog
# for this many seconds. Hard-capped at 900s; grants are bound to your
# loginuid + audit session and never survive a reboot or logout. The
# checkbox always defaults UNCHECKED — nothing is auto-allowed unless you
# tick it on a given prompt.
#
# Defaults:
#   * polkit / GUI path (service "polkit-1"): 300 (5 min) — the checkbox
#     is SHOWN by default. Set [general].remember_seconds = 0 (or
#     [services."polkit-1"].remember_seconds = 0) to hide it / disable.
#   * terminal sudo / su / sudo-i: OFF by default (0), regardless of
#     [general].remember_seconds. Opt in per service, e.g.
#     [services.sudo].remember_seconds = 300.
#
# The generic pkexec action (org.freedesktop.policykit.exec — "run any
# command as root") is never remembered: its grant key omits the command
# line, so a single tick would blanket unrelated root commands.
#
# ⚠️  Terminal caveat: a sudo/su grant is keyed by the elevated program
# NAME, not its full arguments — a grant for `sudo pacman -Syu` also
# covers `sudo pacman -U <file>`, and is honored by every process sharing
# your audit session for the window. Under the shipped `auth sufficient`
# wiring a remembered grant is PASSWORDLESS for its duration. Enable the
# terminal window only if you accept that (see also T3a hardening).
#
# Examples (commented — the GUI default already applies):
#   [general]
#   remember_seconds = 300      # GUI checkbox window (0 = hide/off)
#   [services.sudo]
#   remember_seconds = 300      # opt sudo in (off by default)
