[book]
title = "Sentinel-KDE"
description = "UAC-style PAM + polkit confirmation dialog for KDE Plasma"
authors = ["Atay Özcan"]
language = "en"
src = "src"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/atayozcan/sentinel-kde"
git-repository-icon = "fab-github"
edit-url-template = "https://github.com/atayozcan/sentinel-kde/edit/main/docs/{path}"
site-url = "/sentinel-kde/"
no-section-label = false

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true

[output.html.fold]
enable = true
level = 1
